databases:
  - name: roadwatch-db
    databaseName: roadwatch
    user: roadwatch
    plan: free

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: roadwatch-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roadwatch-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: roadwatch-redis
          type: redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false          # you fill this in Render dashboard
      - key: MAPBOX_TOKEN
        sync: false          # you fill this in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value
      - key: ENVIRONMENT
        value: production
      - key: CHROMA_HOST
        value: localhost      # ChromaDB runs in-process on free tier
      - key: FRONTEND_URL
        fromService:
          name: roadwatch-frontend
          type: web
          property: host

  # ── Frontend (React Static Site) ──────────────────────────────────────────
  - type: web
    name: roadwatch-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /sw.js
        name: Cache-Control
        value: no-cache
    envVars:
      - key: VITE_API_URL
        fromService:
          name: roadwatch-api
          type: web
          property: host
      - key: VITE_MAPBOX_TOKEN
        sync: false          # you fill this in Render dashboard

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: roadwatch-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: roadwatch-db
    databaseName: roadwatch
    user: roadwatch
    plan: free

services:
  # ── Backend (FastAPI via Docker) ───────────────────────────────────────────
  - type: web
    name: roadwatch-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roadwatch-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CHROMA_HOST
        value: localhost
      - key: FRONTEND_URL
        fromService:
          name: roadwatch-frontend
          type: web
          property: host

  # ── Frontend (React Static Site) ──────────────────────────────────────────
  - type: web
    name: roadwatch-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://roadwatch-api-heur.onrender.com
